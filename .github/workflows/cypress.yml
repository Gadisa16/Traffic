name: Cypress E2E

on:
  push:
    branches: [main, master]
    paths:
      - "web-admin/**"
  pull_request:
    branches: [main, master]
    paths:
      - "web-admin/**"

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: mobile-inspector
        run: npm ci

      - name: Run Cypress tests
        working-directory: mobile-inspector
        env:
          CYPRESS_BASE_URL: ${{ secrets.CYPRESS_BASE_URL }}
        run: |
          if [ -z "$CYPRESS_BASE_URL" ]; then
            echo "CYPRESS_BASE_URL not set — set repository secret CYPRESS_BASE_URL to your staging API and re-run CI." 
            exit 1
          fi
          npx cypress run --config-file e2e/cypress.json
